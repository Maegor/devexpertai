<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevExpert AI{% endblock %}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/favicon.ico" sizes="32x32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="brand-header text-white py-3 mb-5">
        <div class="container">
            <span class="fs-4 fw-bold" style="color: var(--accent);">DevExpert</span><span class="fs-4 fw-bold"> AI</span>
        </div>
    </header>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top">
        <small>&copy; 2026 DevExpert AI</small>
    </footer>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
