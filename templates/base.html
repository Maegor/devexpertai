<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevExpert AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-primary: #1a1b2e;
            --bg-secondary: #252638;
            --bg-input: #2d2f45;
            --accent: #e8651a;
            --accent-hover: #cf5712;
            --text-primary: #ffffff;
            --text-muted: #a0a3b1;
            --border-input: #3a3d56;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        .brand-header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--bg-secondary);
        }

        footer {
            background: var(--bg-primary);
            border-top-color: var(--bg-secondary) !important;
            color: var(--text-muted) !important;
        }

        /* Form controls dark theme */
        .form-control,
        .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-input);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 0.65rem 0.9rem;
            transition: border-color 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: var(--bg-input);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: none;
            outline: none;
        }

        .form-control::placeholder {
            color: #5a5d78;
        }

        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #e85454;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.4rem;
        }

        .form-text {
            color: #6b6e88;
        }

        .invalid-feedback {
            color: #e85454;
        }

        /* Card */
        .card {
            background-color: var(--bg-secondary);
            border: none;
            border-radius: 12px;
        }

        /* Button */
        .btn-primary {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.7rem 1.5rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Alert */
        .alert-danger {
            background-color: rgba(232, 84, 84, 0.15);
            border-color: rgba(232, 84, 84, 0.3);
            color: #f08080;
        }

        /* Select options */
        .form-select option {
            background-color: var(--bg-input);
            color: var(--text-primary);
        }

        /* Textarea */
        textarea.form-control {
            resize: vertical;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-primary);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="brand-header text-white py-3 mb-5">
        <div class="container">
            <span class="fs-4 fw-bold" style="color: var(--accent);">DevExpert</span><span class="fs-4 fw-bold"> AI</span>
        </div>
    </header>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top">
        <small>&copy; 2026 DevExpert AI</small>
    </footer>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
