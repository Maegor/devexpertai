<style>
    .section-layout {
        display: flex;
        flex: 1;
        width: 100%;
        min-height: 0;
    }

    /* ── Sub-sidebar ── */
    .sub-sidebar {
        width: 180px;
        flex-shrink: 0;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        padding: 1.25rem 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .sub-sidebar-label {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        padding: 0 0.5rem;
        margin-bottom: 0.5rem;
    }

    .sub-nav-item {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.5rem 0.65rem;
        border-radius: 7px;
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        transition: background 0.12s, color 0.12s;
    }
    .sub-nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .sub-nav-item.active {
        background: var(--accent-dim);
        color: var(--accent);
    }
    .sub-nav-item i { font-size: 0.95rem; width: 1rem; text-align: center; }

    /* ── Partners main area ── */
    .partners-main {
        flex: 1;
        padding: 2rem 2.5rem;
        overflow-y: auto;
    }

    .htmx-indicator-sub {
        opacity: 0;
        transition: opacity 150ms;
    }
    .htmx-request .htmx-indicator-sub { opacity: 1; }
</style>

<div class="section-layout">

    <!-- Sub-sidebar -->
    <nav class="sub-sidebar">
        <div class="sub-sidebar-label">Partners</div>

        <button class="sub-nav-item {% if active_sub == 'dashboard' %}active{% endif %}"
                id="subnav-dashboard"
                hx-get="/admin/partners/dashboard"
                hx-target="#partners-main"
                hx-swap="innerHTML"
                onclick="setSubNav(this)">
            <i class="bi bi-grid-1x2"></i>Dashboard
        </button>

        <button class="sub-nav-item {% if active_sub == 'list' %}active{% endif %}"
                id="subnav-list"
                hx-get="/admin/partners"
                hx-target="#partners-main"
                hx-swap="innerHTML"
                onclick="setSubNav(this)">
            <i class="bi bi-people"></i>Partners
        </button>
    </nav>

    <!-- Content -->
    <div class="partners-main" id="partners-main">
        {% if active_sub == 'dashboard' %}
            {% include "admin/partials/partners_dashboard.html" %}
        {% endif %}
    </div>
</div>

<script>
    function setSubNav(el) {
        document.querySelectorAll('.sub-nav-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
</script>
