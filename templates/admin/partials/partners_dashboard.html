<style>
    .dash-header { margin-bottom: 1.75rem; }
    .dash-header h2 {
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--text);
    }
    .dash-header p { color: var(--text-muted); font-size: 0.82rem; margin-top: 0.2rem; }

    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
    }

    .kpi-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.25rem 1.1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        position: relative;
        overflow: hidden;
        transition: border-color 0.15s;
    }
    .kpi-card:hover { border-color: var(--kpi-color, var(--border)); }

    .kpi-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: var(--kpi-color, transparent);
        border-radius: 12px 12px 0 0;
    }

    .kpi-icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        background: color-mix(in srgb, var(--kpi-color, #666) 12%, transparent);
        color: var(--kpi-color, var(--text-muted));
    }

    .kpi-value {
        font-size: 2rem;
        font-weight: 700;
        line-height: 1;
        color: var(--text);
        letter-spacing: -0.02em;
    }

    .kpi-label {
        font-size: 0.775rem;
        color: var(--text-muted);
        font-weight: 500;
    }

    .kpi-total {
        --kpi-color: #a78bfa;
    }
    .kpi-active {
        --kpi-color: #34c759;
    }
    .kpi-pending {
        --kpi-color: #ff9f0a;
    }
    .kpi-inactive {
        --kpi-color: #7c8099;
    }
    .kpi-suspended {
        --kpi-color: #e85454;
    }
    .kpi-rejected {
        --kpi-color: #c0392b;
    }
</style>

<div class="dash-header">
    <h2>Dashboard</h2>
    <p>Resumen del estado de los partners</p>
</div>

<div class="kpi-grid">

    <div class="kpi-card kpi-total">
        <div class="kpi-icon"><i class="bi bi-people-fill"></i></div>
        <div class="kpi-value">{{ kpis.total }}</div>
        <div class="kpi-label">Total</div>
    </div>

    <div class="kpi-card kpi-active">
        <div class="kpi-icon"><i class="bi bi-check-circle-fill"></i></div>
        <div class="kpi-value">{{ kpis.active }}</div>
        <div class="kpi-label">Active</div>
    </div>

    <div class="kpi-card kpi-pending">
        <div class="kpi-icon"><i class="bi bi-hourglass-split"></i></div>
        <div class="kpi-value">{{ kpis.pending_review }}</div>
        <div class="kpi-label">Pending Review</div>
    </div>

    <div class="kpi-card kpi-inactive">
        <div class="kpi-icon"><i class="bi bi-pause-circle"></i></div>
        <div class="kpi-value">{{ kpis.inactive }}</div>
        <div class="kpi-label">Inactive</div>
    </div>

    <div class="kpi-card kpi-suspended">
        <div class="kpi-icon"><i class="bi bi-slash-circle"></i></div>
        <div class="kpi-value">{{ kpis.suspended }}</div>
        <div class="kpi-label">Suspended</div>
    </div>

    <div class="kpi-card kpi-rejected">
        <div class="kpi-icon"><i class="bi bi-x-circle-fill"></i></div>
        <div class="kpi-value">{{ kpis.rejected }}</div>
        <div class="kpi-label">Rejected</div>
    </div>

</div>
