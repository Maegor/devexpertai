<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · DevExpert AI</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/favicon.ico" sizes="32x32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/admin/dashboard.css">
</head>
<body>

    <header class="topnav">
        <div class="topnav-brand"><em>DevExpert</em> AI</div>

        <div class="topnav-tabs">
            <button class="nav-tab active" id="tab-partners"
                    hx-get="/admin/partners-section"
                    hx-target="#section-content"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setTab(this)">
                <i class="bi bi-people"></i>Partners
            </button>
            <button class="nav-tab" id="tab-internal"
                    hx-get="/admin/internal_users"
                    hx-target="#section-content"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setTab(this)">
                <i class="bi bi-person-badge"></i>Internal Users
            </button>
        </div>

        <div class="topnav-right">
            <i class="bi bi-person-circle"></i>
            <span>{{ user_name }}</span>
            <a href="/admin/logout" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i>Salir
            </a>
        </div>
    </header>

    <div class="page-body">
        <div id="section-spinner"><span class="spinner-border spinner-border-sm"></span> Cargando...</div>
        <div id="section-content"
             hx-get="/admin/partners-section"
             hx-trigger="load"
             hx-swap="innerHTML"></div>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
        function setTab(el) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
