<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · DevExpert AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --bg-card: #181b26;
            --bg-hover: #1e2235;
            --border: #252840;
            --accent: #e8651a;
            --accent-dim: rgba(232, 101, 26, 0.12);
            --text: #e8eaf0;
            --text-muted: #7c8099;
            --text-dim: #4a4d66;
            --nav-h: 52px;
            --sidebar-w: 200px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        /* ── Top nav ── */
        .topnav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 0;
            z-index: 200;
        }

        .topnav-brand {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            margin-right: 2rem;
        }
        .topnav-brand em { color: var(--accent); font-style: normal; }

        .topnav-tabs {
            display: flex;
            height: 100%;
            gap: 0;
            flex: 1;
        }

        .nav-tab {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            height: 100%;
            padding: 0 1.1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            position: relative;
            top: 1px; /* align border-bottom with nav border */
        }
        .nav-tab:hover { color: var(--text); }
        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .nav-tab i { font-size: 0.9rem; }

        .topnav-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 0.775rem;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Body layout ── */
        .page-body {
            margin-top: var(--nav-h);
            min-height: calc(100vh - var(--nav-h));
            display: flex;
        }

        /* ── Loading indicator ── */
        #section-spinner {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 3rem 2rem;
            opacity: 0;
            transition: opacity 200ms;
        }
        .htmx-request #section-spinner { opacity: 1; }

        #section-content {
            flex: 1;
            display: flex;
            min-height: 0;
        }
    </style>
</head>
<body>

    <header class="topnav">
        <div class="topnav-brand"><em>DevExpert</em> AI</div>

        <div class="topnav-tabs">
            <button class="nav-tab active" id="tab-partners"
                    hx-get="/admin/partners-section"
                    hx-target="#section-content"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setTab(this)">
                <i class="bi bi-people"></i>Partners
            </button>
            <button class="nav-tab" id="tab-internal"
                    hx-get="/admin/internal_users"
                    hx-target="#section-content"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setTab(this)">
                <i class="bi bi-person-badge"></i>Internal Users
            </button>
        </div>

        <div class="topnav-right">
            <i class="bi bi-person-circle"></i>
            <span>{{ user_name }}</span>
            <a href="/admin/logout" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i>Salir
            </a>
        </div>
    </header>

    <div class="page-body">
        <div id="section-spinner"><span class="spinner-border spinner-border-sm"></span> Cargando...</div>
        <div id="section-content"
             hx-get="/admin/partners-section"
             hx-trigger="load"
             hx-swap="innerHTML"></div>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
        function setTab(el) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
