<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal · DevExpert AI</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/favicon.ico" sizes="32x32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="/static/css/partners/dashboard.css">
</head>
<body>

    <header class="topnav">
        <div class="topnav-brand"><em>DevExpert</em> AI</div>
        <span style="color: var(--text-dim); font-size: 0.75rem; margin-right: auto;">Partner Portal</span>
        <div class="topnav-right">
            <i class="bi bi-person-circle"></i>
            <span>{{ partner_name }}</span>
            <a href="/partners/logout" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i>Sign out
            </a>
        </div>
    </header>

    <div class="page-body">
        <!-- Sidebar -->
        <nav class="sidebar">
            <span class="sidebar-label">My Account</span>
            <button class="sidebar-item active" id="nav-profile"
                    hx-get="/partners/dashboard/profile"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-person-lines-fill"></i>Personal Data
            </button>
            <button class="sidebar-item" id="nav-invoices"
                    hx-get="/partners/dashboard/invoices"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-receipt"></i>Invoices
            </button>
            <button class="sidebar-item" id="nav-rewards"
                    hx-get="/partners/dashboard/rewards"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-gift"></i>Rewards
            </button>
            <button class="sidebar-item" id="nav-deals"
                    hx-get="/partners/dashboard/deals"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    hx-indicator="#section-spinner"
                    onclick="setNav(this)">
                <i class="bi bi-briefcase"></i>Deals
            </button>
        </nav>

        <!-- Main content -->
        <main class="content-area">
            <div id="section-spinner">
                <span class="spinner-border spinner-border-sm"></span> Loading...
            </div>
            <div id="content-area"
                 hx-get="/partners/dashboard/profile"
                 hx-trigger="load"
                 hx-swap="innerHTML"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
        function setNav(el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // When clicking a sidebar item, hide the invoice detail back button if present
        document.body.addEventListener('htmx:afterSwap', function (e) {
            if (e.target.id === 'content-area') {
                // Reattach click handler for invoice rows if needed
            }
        });
    </script>
</body>
</html>
