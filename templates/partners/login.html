<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal · DevExpert AI</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/favicon.ico" sizes="32x32" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-name"><span>DevExpert</span> AI</div>
            <span class="portal-badge">Partner Portal</span>
        </div>

        {% if error %}
        <div class="alert-error">
            <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/partners/login"
              hx-post="/partners/login"
              hx-target="body"
              hx-push-url="true"
              hx-indicator="#login-btn">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email"
                       class="form-control" placeholder="your@email.com"
                       required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="••••••••"
                       required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-login">
                <span class="btn-text">Sign in</span>
                <span class="htmx-indicator">
                    <span class="spinner-border spinner-border-sm" role="status"></span>
                    Verifying...
                </span>
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</body>
</html>
